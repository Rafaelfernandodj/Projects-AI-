<!doctype html>
<html lang="pt-BR" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <title>Liam AI English</title>
    <link rel="icon" href="/pwa-manifest-icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#040D1C">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="Liam AI English">
    <meta name="apple-mobile-web-app-title" content="Liam AI">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="description" content="Seu professor de inglês com IA 24h por dia">
    <!-- PWA primary color -->
    <meta name="theme-color" content="#040D1C">
    <meta name="msapplication-TileColor" content="#040D1C">
    <script>
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: () => {
            console.warn('Blocked attempt to overwrite window.fetch');
          }
        });
      } catch (err) {
        console.warn('Could not define customizable window.fetch:', err);
      }
    </script>
  </head>
  <body class="notranslate">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
